# Render Blueprint: Flask-Backend (Pepe)
# Postgres läuft bei Supabase → DATABASE_URL manuell im Render-Dashboard setzen.
# Repo verbinden: Blueprint wird aus dieser Datei gelesen (Repo-Root).

services:
  - type: web
    name: pepe-backend
    runtime: python
    region: frankfurt
    rootDir: backend
    # pip aktualisieren hilft bei Wheels (Pillow, psycopg) und Resolver-Fehlern
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /healthz
    envVars:
      # Volle Version nötig (Render-Doku); 3.11.0 fehlt oft auf den Build-Images
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
